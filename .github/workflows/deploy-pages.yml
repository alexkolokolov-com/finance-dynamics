name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Set Vite base path
        run: |
          if [ -f public/CNAME ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build

      - name: Ensure favicon in deploy artifact
        run: |
          cat > dist/favicon.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="FizFin icon">
            <circle cx="32" cy="32" r="30" fill="#ffffff" stroke="#1f1f1f" stroke-width="2.5" />
            <circle cx="32" cy="32" r="20" fill="#c9a041" />
          </svg>
          SVG

          node <<'NODE'
          const fs = require("fs");
          const path = "dist/index.html";
          let html = fs.readFileSync(path, "utf8");
          if (!html.includes('href="/favicon.svg"')) {
            html = html.replace(
              "</head>",
              '    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />\n</head>'
            );
            fs.writeFileSync(path, html);
          }
          NODE

      - name: Add SPA fallback for deep links
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
